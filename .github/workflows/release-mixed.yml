name: Release (Mixed)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release 版本号（例如 v1.0.0）'
        required: true
        type: string
      build-jar:
        description: '📦 JAR 包'
        type: boolean
        default: true
      build-native-linux:
        description: '🐧 Linux 原生二进制'
        type: boolean
        default: true
      build-native-macos:
        description: '🍎 macOS 原生二进制 (Apple Silicon) [Self-Hosted]'
        type: boolean
        default: true
      build-native-windows:
        description: '🪟 Windows 原生二进制'
        type: boolean
        default: true
      build-electron-linux:
        description: '🐧 Linux 桌面安装包 (AppImage)'
        type: boolean
        default: true
      build-electron-macos:
        description: '🍎 macOS 桌面安装包 (DMG)'
        type: boolean
        default: true
      build-electron-windows:
        description: '🪟 Windows 桌面安装包 (NSIS)'
        type: boolean
        default: true

jobs:
  # ═══════════════════════════════════════════════════════════
  # Linux + Windows：云端 runner
  # ═══════════════════════════════════════════════════════════
  native-build:
    name: Native Build (${{ matrix.os }})
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            binary-name: eddie-linux-amd64
          - os: windows-latest
            binary-name: eddie-windows-amd64.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Skip if not requested
        id: check
        if: |
          (runner.os == 'Linux' && !inputs.build-native-linux) ||
          (runner.os == 'Windows' && !inputs.build-native-windows)
        shell: bash
        run: echo "skip=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        if: steps.check.outputs.skip != 'true'

      - name: Set up GraalVM JDK 25
        if: steps.check.outputs.skip != 'true'
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: 'graalvm'
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24.16'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: steps.check.outputs.skip != 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend static files
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          mkdir -p ai-app/src/main/resources/static
          cp -r frontend/dist/* ai-app/src/main/resources/static/

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: mvn install -Pnative -pl ai-app -am -DskipTests

      - name: Native compile (Linux)
        if: runner.os == 'Linux' && steps.check.outputs.skip != 'true'
        run: |
          mvn -Pnative native:compile -pl ai-app -DskipTests \
            -Dnative-image.buildArgs="-J-Xmx4g"

      - name: Native compile (Windows)
        if: runner.os == 'Windows' && steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          mvn -Pnative native:compile -pl ai-app -DskipTests \
            -Dnative-image.buildArgs="-J-Xmx4g"

      - name: Rename binary
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv ai-app/target/eddie-app.exe ai-app/target/${{ matrix.binary-name }}
          else
            mv ai-app/target/eddie-app ai-app/target/${{ matrix.binary-name }}
          fi

      - name: Compress binary
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip ai-app/target/${{ matrix.binary-name }}.zip ai-app/target/${{ matrix.binary-name }}
          else
            tar -czf ai-app/target/${{ matrix.binary-name }}.tar.gz ai-app/target/${{ matrix.binary-name }}
          fi

      - name: Upload artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary-name }}
          path: >
            ${{
              runner.os == 'Windows' &&
              format('ai-app/target/{0}.zip', matrix.binary-name) ||
              format('ai-app/target/{0}.tar.gz', matrix.binary-name)
            }}

  # ═══════════════════════════════════════════════════════════
  # macOS arm64：本地自托管 runner
  # ═══════════════════════════════════════════════════════════
  native-build-macos:
    name: Native Build (macOS arm64, Self-Hosted)
    if: inputs.build-native-macos
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - uses: actions/checkout@v5

      # 使用自托管 runner 环境变量中的 GRAALVM_HOME 配置 JDK
      - name: Set up GraalVM JDK 25 (local)
        run: |
          echo "JAVA_HOME=$GRAALVM_HOME" >> "$GITHUB_ENV"
          echo "GRAALVM_HOME=$GRAALVM_HOME" >> "$GITHUB_ENV"
          echo "$GRAALVM_HOME/bin" >> "$GITHUB_PATH"
          java --version
          native-image --version

      # 使用自托管 runner 环境变量中的 NODE_HOME 配置 Node.js
      - name: Set up Node.js 24.16 (local)
        run: |
          echo "$NODE_HOME/bin" >> "$GITHUB_PATH"
          node --version
          npm --version

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend static files
        run: |
          mkdir -p ai-app/src/main/resources/static
          cp -r frontend/dist/* ai-app/src/main/resources/static/

      - name: Install dependencies
        run: mvn install -Pnative -pl ai-app -am -DskipTests

      - name: Native compile (macOS arm64)
        run: |
          mvn -Pnative native:compile -pl ai-app -DskipTests \
            -Dnative-image.buildArgs="-J-Xmx10g"

      - name: Rename binary
        run: |
          mv ai-app/target/eddie-app ai-app/target/eddie-darwin-arm64

      - name: Compress binary
        run: |
          tar -czf ai-app/target/eddie-darwin-arm64.tar.gz ai-app/target/eddie-darwin-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: eddie-darwin-arm64
          path: ai-app/target/eddie-darwin-arm64.tar.gz

  # ═══════════════════════════════════════════════════════════
  # JAR 包（云端）
  # ═══════════════════════════════════════════════════════════
  jar-build:
    name: Build JAR
    if: inputs.build-jar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: 'graalvm'
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend static files
        run: |
          mkdir -p ai-app/src/main/resources/static
          cp -r frontend/dist/* ai-app/src/main/resources/static/

      - name: Package JAR
        run: mvn clean package -DskipTests -Dmaven.javadoc.skip=true

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: eddie-jar
          path: ai-app/target/eddie-app.jar

  # ═══════════════════════════════════════════════════════════
  # Electron 打包（云端，依赖所有 native build）
  # ═══════════════════════════════════════════════════════════
  electron-build:
    name: Electron Build (${{ matrix.os }})
    needs: [native-build, native-build-macos]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            binary-name: eddie-linux-amd64
            electron-arch: --linux
            electron-dist-dir: electron/dist
          - os: macos-latest
            binary-name: eddie-darwin-arm64
            electron-arch: --mac
            electron-dist-dir: electron/dist
          - os: windows-latest
            binary-name: eddie-windows-amd64.exe
            electron-arch: --win
            electron-dist-dir: electron/dist

    steps:
      - name: Skip if not requested
        id: check
        if: |
          (runner.os == 'Linux' && !inputs.build-electron-linux) ||
          (runner.os == 'macOS' && !inputs.build-electron-macos) ||
          (runner.os == 'Windows' && !inputs.build-electron-windows)
        shell: bash
        run: echo "skip=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        if: steps.check.outputs.skip != 'true'

      - name: Download native binary
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary-name }}
          path: native-binary

      - name: Prepare native binary for electron-builder
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          mkdir -p target
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows: artifact 是 .zip 格式
            7z e native-binary/${{ matrix.binary-name }}.zip -otarget -y
            mv target/${{ matrix.binary-name }} target/eddie-app.exe
            chmod +x target/eddie-app.exe
          else
            # Linux/macOS: artifact 是 .tar.gz 格式
            tar -xzf native-binary/${{ matrix.binary-name }}.tar.gz -C target --strip-components=2
            mv target/${{ matrix.binary-name }} target/eddie-app
            chmod +x target/eddie-app
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24.16'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Build frontend
        if: steps.check.outputs.skip != 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend static files
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p electron/src/main/resources/static
          cp -r frontend/dist/* electron/src/main/resources/static/

      - name: Install Electron dependencies
        if: steps.check.outputs.skip != 'true'
        working-directory: electron
        run: npm install

      - name: Build Electron app
        if: steps.check.outputs.skip != 'true'
        working-directory: electron
        run: npx electron-builder ${{ matrix.electron-arch }}

      - name: Prepare Electron artifacts for upload
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          # 只复制安装包文件到独立目录，排除 .app bundle 内部文件
          mkdir -p electron/installers
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp electron/dist/*.dmg electron/installers/ 2>/dev/null || true
            cp electron/dist/latest*.yml electron/installers/ 2>/dev/null || true
          elif [ "${{ runner.os }}" = "Linux" ]; then
            cp electron/dist/*.AppImage electron/installers/ 2>/dev/null || true
            cp electron/dist/latest*.yml electron/installers/ 2>/dev/null || true
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cp electron/dist/*.exe electron/installers/ 2>/dev/null || true
            cp electron/dist/latest*.yml electron/installers/ 2>/dev/null || true
          fi

      - name: Upload Electron artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary-name }}-electron
          path: electron/installers/*

  # ═══════════════════════════════════════════════════════════
  # 创建 Release（云端）
  # ═══════════════════════════════════════════════════════════
  create-release:
    name: Create Release
    needs: [native-build, native-build-macos, jar-build, electron-build]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate Release Notes from CHANGELOG.md
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          VER="${VERSION#v}"  # 去掉 v 前缀，例如 v1.0.0 → 1.0.0

          # 从 CHANGELOG.md 提取当前版本条目
          awk -v ver="$VER" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md

          # 如果提取失败（CHANGELOG 未更新），回退到默认文案
          if [ ! -s release-notes.md ]; then
            {
              echo "请查看 [CHANGELOG](CHANGELOG.md) 了解此版本的变更详情。"
              echo ""
              echo "> **🍎 macOS 用户注意**："
              echo "> 首次打开 Eddie 时，系统可能提示应用无法验证。"
              echo "> 请按以下步骤操作："
              echo ">"
              echo "> 1. 打开 **系统设置 → 隐私与安全性**"
              echo "> 2. 向下滚动到 **安全性** 区域"
              echo "> 3. 点击 **\"仍要打开\"** 按钮"
              echo "> 4. 在弹出的确认窗口中点击 **\"打开\"**"
              echo ">"
              echo "> 如提示\"已损坏\"，请在终端执行："
              echo "> \`\`\`bash"
              echo "> xattr -dr com.apple.quarantine /Applications/Eddie.app"
              echo "> \`\`\`"
            } > release-notes.md
          fi

      - name: Create Release & Upload Assets (Sequential)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ── ① 创建 draft release（不含资产）───────────────────
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes-file release-notes.md \
            --draft

          # 逐文件上传辅助函数（串行，保证 created_at 严格递增）
          upload() {
            echo "→ Uploading: $(basename "$1")"
            gh release upload "${{ inputs.version }}" "$1" --clobber
          }

          # ═══════════════════════════════════════════════════════
          # 以下顺序即 Release 页面展示顺序
          # ═══════════════════════════════════════════════════════

          # ── ② JAR ──
          if [ "${{ inputs.build-jar }}" = "true" ]; then
            cp release-artifacts/eddie-jar/eddie-app.jar \
               "release-artifacts/eddie-${{ inputs.version }}.jar"
            upload "release-artifacts/eddie-${{ inputs.version }}.jar"
          fi

          # ── ③ Linux 原生二进制 ──
          if [ "${{ inputs.build-native-linux }}" = "true" ]; then
            cp release-artifacts/eddie-linux-amd64/eddie-linux-amd64.tar.gz \
               "release-artifacts/eddie-linux-amd64/eddie-${{ inputs.version }}-linux-amd64.tar.gz"
            upload "release-artifacts/eddie-linux-amd64/eddie-${{ inputs.version }}-linux-amd64.tar.gz"
          fi

          # ── ④ Linux Electron ──
          if [ "${{ inputs.build-electron-linux }}" = "true" ]; then
            for f in release-artifacts/eddie-linux-amd64-electron/*.AppImage; do
              [ -f "$f" ] || continue
              new_f="$(dirname "$f")/$(basename "$f" | sed 's/\(Eddie-\)[^-]*/\1${{ inputs.version }}/')"
              cp "$f" "$new_f"
              upload "$new_f"
            done
            for f in release-artifacts/eddie-linux-amd64-electron/*.yml; do
              [ -f "$f" ] || continue
              upload "$f"
            done
          fi

          # ── ⑤ macOS 原生二进制 ──
          if [ "${{ inputs.build-native-macos }}" = "true" ]; then
            cp release-artifacts/eddie-darwin-arm64/eddie-darwin-arm64.tar.gz \
               "release-artifacts/eddie-darwin-arm64/eddie-${{ inputs.version }}-darwin-arm64.tar.gz"
            upload "release-artifacts/eddie-darwin-arm64/eddie-${{ inputs.version }}-darwin-arm64.tar.gz"
          fi

          # ── ⑥ macOS Electron ──
          if [ "${{ inputs.build-electron-macos }}" = "true" ]; then
            for f in release-artifacts/eddie-darwin-arm64-electron/*.dmg; do
              [ -f "$f" ] || continue
              new_f="$(dirname "$f")/$(basename "$f" | sed 's/\(Eddie-\)[^-]*/\1${{ inputs.version }}/')"
              cp "$f" "$new_f"
              upload "$new_f"
            done
            for f in release-artifacts/eddie-darwin-arm64-electron/*.yml; do
              [ -f "$f" ] || continue
              upload "$f"
            done
          fi

          # ── ⑦ Windows 原生二进制 ──
          if [ "${{ inputs.build-native-windows }}" = "true" ]; then
            cp release-artifacts/eddie-windows-amd64.exe/eddie-windows-amd64.exe.zip \
               "release-artifacts/eddie-windows-amd64.exe/eddie-${{ inputs.version }}-windows-amd64.zip"
            upload "release-artifacts/eddie-windows-amd64.exe/eddie-${{ inputs.version }}-windows-amd64.zip"
          fi

          # ── ⑧ Windows Electron ──
          if [ "${{ inputs.build-electron-windows }}" = "true" ]; then
            for f in release-artifacts/eddie-windows-amd64.exe-electron/*.exe; do
              [ -f "$f" ] || continue
              new_f="$(dirname "$f")/$(basename "$f" | sed 's/\(Eddie-\)[^-]*/\1${{ inputs.version }}/')"
              cp "$f" "$new_f"
              upload "$new_f"
            done
            for f in release-artifacts/eddie-windows-amd64.exe-electron/*.yml; do
              [ -f "$f" ] || continue
              upload "$f"
            done
          fi
