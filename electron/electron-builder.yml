# electron/electron-builder.yml
# @author Eddie
# {@code @date} 2026-06-30

appId: cc.wlizhi.eddie
productName: Eddie
copyright: Copyright © 2026 Eddie

directories:
  output: dist

files:
  - main.js
  - preload.js
  - "!node_modules"

icon: icons/icon.png

# extraResources 已移至各平台独立配置，详见 win/mac/linux 块

mac:
  extraResources:
    # Java 后端原生二进制
    - from: ../target/eddie-app
      to: eddie-app
    # Vue 前端构建产物
    - from: ../frontend/dist
      to: frontend-dist
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  identity: null
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # 增量更新
  differentialPackage: true

win:
  extraResources:
    # Java 后端原生二进制（Windows 必须带 .exe 后缀）
    - from: ../target/eddie-app.exe
      to: eddie-app.exe
    # Vue 前端构建产物
    - from: ../frontend/dist
      to: frontend-dist
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-win-x64.${ext}"

linux:
  extraResources:
    # Java 后端原生二进制
    - from: ../target/eddie-app
      to: eddie-app
    # Vue 前端构建产物
    - from: ../frontend/dist
      to: frontend-dist
  target:
    - target: AppImage
      arch:
        - x64
  icon: icons
  category: Utility
  artifactName: "${productName}-${version}-linux-x64.${ext}"
