# electron/electron-builder.yml
# @author Eddie
# {@code @date} 2026-06-30

appId: cc.wlizhi.eddie
productName: Eddie
copyright: Copyright © 2026 Eddie

directories:
  output: dist

files:
  - main.js
  - preload.js
  - "!node_modules"

icon: icons/icon.png

extraResources:
  # Java 后端原生二进制
  - from: ../target/eddie-app
    to: eddie-app
  # Vue 前端构建产物
  - from: ../frontend/dist
    to: frontend-dist

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  hardenedRuntime: true
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-win-x64.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: icons
  category: Utility
  artifactName: "${productName}-${version}-linux-x64.${ext}"
