server:
  port: 11520

spring:
  datasource:
    url: jdbc:sqlite:${user.home}/.eddie-ai/eddie-ai.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# DeepSeek 模型配置（兼容 OpenAI 协议）
# 第一版硬编码，后续从 model_provider 表动态读取
deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-your-key-here}
  base-url: https://api.deepseek.com/v1
  model: deepseek-chat
  temperature: 0.7
