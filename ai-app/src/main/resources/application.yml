server:
  port: 11520
  tomcat:
    threads:
      max: 8
      min-spare: 1
    accept-count: 10
    max-connections: 20

spring:
  datasource:
    url: jdbc:sqlite:${user.home}/.eddie-ai/eddie-ai.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# 数据目录（SQLite 数据库、用户上传文件等）
eddie-ai:
  data-dir: ${user.home}/.eddie-ai
