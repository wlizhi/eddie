server:
  port: 11520
  tomcat:
    threads:
      max: 8
      min-spare: 1
    accept-count: 10
    max-connections: 20

spring:
  datasource:
    url: jdbc:sqlite:${user.home}/.eddie/eddie.db?journal_mode=WAL&synchronous=NORMAL&cache_size=10000
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# 数据目录（SQLite 数据库、用户上传文件等）
eddie:
  data-dir: ${user.home}/.eddie
  init-scripts:
      - init/model_provider_init_1.sql
  prompts:
    title-generation: prompts/title-generation.md
