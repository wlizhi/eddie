server:
  port: 11520
  tomcat:
    threads:
      max: 8
      min-spare: 1
    accept-count: 10
    max-connections: 20
    # 异步请求超时（毫秒）：
    # SSE 流式响应总时长限制，默认 Tomcat 为 30 秒。
    # 慢模型长回答可能超过此值导致中途断开，设 10 分钟。
    async-request-timeout: 600000
    # HTTP 连接超时（毫秒）：
    # 建立 TCP 连接的最大等待时间。设为 10 分钟确保长连接不因空闲被回收。
    connection-timeout: 600000

spring:
  datasource:
    url: jdbc:sqlite:${user.home}/.eddie/eddie.db?journal_mode=WAL&synchronous=NORMAL&cache_size=10000
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# 数据目录（SQLite 数据库、用户上传文件等）
eddie:
  data-dir: ${user.home}/.eddie
  init-scripts:
      - init/model_provider_init_1.sql
  prompts:
    title-generation: prompts/title-generation.md
