server:
  port: 11520
  tomcat:
    # 虚拟线程模式下，Tomcat 内部线程池被替换为虚拟线程执行器，
    # 以下 threads.max / min-spare 仅作为降级回退配置保留。
    threads:
      max: 8
      min-spare: 1
    accept-count: 10
    max-connections: 20
    # 异步请求超时（毫秒）：
    # SSE 流式响应总时长限制，默认 Tomcat 为 30 秒。
    # 慢模型长回答可能超过此值导致中途断开，设 30 分钟。
    async-request-timeout: 1800000
    # HTTP 连接超时（毫秒）：
    # 建立 TCP 连接的最大等待时间。设为 30 分钟确保长连接不因空闲被回收。
    connection-timeout: 1800000

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:sqlite:${eddie.data}/eddie.db?journal_mode=WAL&synchronous=NORMAL&cache_size=10000
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  sql:
    init:
      mode: always
      schema-locations: classpath:db/ddl/schema.sql

# 自定义属性
eddie:
  version: 1.0.0-beta
  init-scripts:
    - db/init/model_provider_init_1.sql
    - db/init/ai_assistant_init_1.sql
  prompts:
    session-title-prompts: prompts/title-generation.md
    agent-chat-prompts: prompts/agent-chat.md
    agent-task-plan-prompts: prompts/agent-task-plan.md
    agent-task-execute-prompts: prompts/agent-task-execute.md
  agent-datasource:
    url: jdbc:sqlite:${eddie.data}/eddie-agent.db?journal_mode=WAL&synchronous=NORMAL&cache_size=10000
    driver-class-name: org.sqlite.JDBC
    maximum-pool-size: 1
    schema-location: classpath:db/ddl/schema-agent.sql
